// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36

        ndkVersion = "28.2.13676358"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        // classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")


        // Blixt dependencies:
        // Needed for react-native-camera-kit
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20")
        classpath("com.google.protobuf:protobuf-gradle-plugin:0.9.6")
        classpath("com.google.gms:google-services:4.4.2")

    }
}

allprojects {
    repositories {
        mavenCentral()
    }
}

def reproducibleBuildRoot = rootProject.projectDir.parentFile.absolutePath.replace(File.separatorChar, '/' as char)
def reproducibleNativeFlags = [
        "-frandom-seed=blixt-wallet",
        "-fdebug-compilation-dir=.",
        "-ffile-prefix-map=${reproducibleBuildRoot}=.",
        "-fdebug-prefix-map=${reproducibleBuildRoot}=."
]
def reproducibleNativeLinkerFlags = "-Wl,--build-id=sha1"

tasks.withType(AbstractArchiveTask).configureEach {
    preserveFileTimestamps = false
    reproducibleFileOrder = true
}

subprojects { subproject ->
    ["com.android.application", "com.android.library"].each { androidPlugin ->
        subproject.plugins.withId(androidPlugin) {
            def androidExtension = subproject.extensions.findByName("android")
            if (androidExtension == null) {
                return
            }

            androidExtension.defaultConfig {
                externalNativeBuild {
                    cmake {
                        arguments "-DCMAKE_SHARED_LINKER_FLAGS=${reproducibleNativeLinkerFlags}"
                        cFlags(*reproducibleNativeFlags)
                        cppFlags(*reproducibleNativeFlags)
                    }
                }
            }
        }
    }

    subproject.tasks.withType(AbstractArchiveTask).configureEach {
        preserveFileTimestamps = false
        reproducibleFileOrder = true
    }
}

apply plugin: "com.facebook.react.rootproject"
