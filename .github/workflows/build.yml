name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.11.0"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Android debug APK
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2048m"
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleChainmainnetNormalDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-chainmainnet-normal-debug-apk
          path: android/app/build/outputs/apk/chainmainnetNormal/debug/*.apk
          if-no-files-found: error

